<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>kiControl</title>
  <!-- Un único script carga todo lo común: CSS, librerías, config y componentes -->
  <script src="components/ki-head.js"></script>
</head>

<body class="sb-nav-fixed">

  <!-- Top nav -->
  <ki-topnav></ki-topnav>

  <!-- Sidebar + contenido -->
  <div id="layoutSidenav">

    <!--
      Cambia `active` según la página:
      index | status | alarms | input-output | graphs |
      parameters | parameters-io | commands | panel
    -->
    <ki-sidebar active="index"></ki-sidebar>

    <div id="layoutSidenav_content">
      <main>
        <div class="container-fluid p-3">
          <div class="d-flex justify-content-center row">
            <div id="main-load" class="spinner-border" role="status"
                 style="width:6rem;height:6rem;color:#1a82ba;">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
          <div style="display:none;" class="row" id="Grid-Container"></div>
        </div>
      </main>
    </div>

  </div><!-- /layoutSidenav -->

  <!--
    Scripts específicos de esta página.
    kiReady() garantiza que jQuery y CLIENT_CONFIG ya están disponibles
    antes de ejecutarlos, sin importar la velocidad de carga de ki-head.js.
  -->
  <script>
    kiReady([
      'js/lib/dixell.js',
      'js/scripts.js',
      'js/main.js',
    ]);
  </script>

</body>
</html>
