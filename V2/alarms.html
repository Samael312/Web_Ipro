<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <script src="js/head.js"></script>
</head>

<body class="sb-nav-fixed">
  <div id="topnav-root"></div>
  <div id="layoutSidenav">
    <div id="layoutSidenav_nav"></div>
    <div id="layoutSidenav_content">
      <main>
        <div class="container-fluid p-3">
          <div class="d-flex justify-content-center row">
            <div id="main-load" class="spinner-border" role="status" style="width: 6rem; height: 6rem;color: #1a82ba;">
              <span class="visually-hidden">Loading...</span>
            </div>
          </div>
          <div style="display: none;" id="Grid-Container">
            <div id="alarmas" align="center">
              <h3 class='text-center' style='background-color: #d9daff;' data-i18n="ALARMS">Alarmas activas</h3>
              <h5 id="alarm-list" style="text-align: left; margin-left: 20px; display: none;" data-i18n="ALARM">Sin alarmas activas</h5>
              <div class="row justify-content-center">
                <div class="col-10">
                  <table class="table table-striped" id="alarm-table" align="center"></table>
                </div>
              </div>
            </div>
            <div id="historico" align="center">
              <h3 class='text-center' style='background-color: #d9daff;' data-i18n="ALARMS">Alarmas históricas</h3>
              <h5 id="alarm-histo" style="text-align: left; margin-left: 20px; display: none;" data-i18n="ALARM">Sin alarmas históricas</h5>
              <div class="row justify-content-center">
                <div class="col-10">
                  <table class="table table-striped" id="alarm-table-histo" align="center"></table>
                </div>
              </div>
            </div>
            <div id="avisos" align="center">
              <h3 class='text-center' style='background-color: #d9daff;' data-i18n="ALARMS">Avisos</h3>
              <h5 id="warn-list" style="text-align: left; margin-left: 20px; display: none;" data-i18n="ALARM">Sin avisos activos</h5>
              <div class="row justify-content-center">
                <div class="col-10">
                  <table class="table table-striped" id="warning-table" align="center"></table>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>
  <!-- Scripts de Librerias -->

  <script src="js/po2json.js"></script>
  <script src="js/lib/i18next.min.js"></script>
  <script src="js/lang/i18next-init.js"></script>
  <script src="js/lib/jquery.min.js"></script>
  <script src="js/lib/dixell.js"></script>
  <script src="js/layout.js"></script>
  <script>window.mountLayout('alarms');</script>
  <!-- Scripts de Intarcon -->
  <script src="js/scripts.js"></script>
  <script src="js/intarcon.js"></script>
  <script src="js/alarms.js"></script>
</body>
  <script src="js/lang/translate-page.js"></script>

</html>
