<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <script src="js/head.js"></script>
</head>

<body class="sb-nav-fixed">
  <div id="topnav-root"></div>
  <div id="layoutSidenav">
    <div id="layoutSidenav_nav"></div>
    <div id="layoutSidenav_content">
      <main>
        <div class="container-fluid p-3 text-center">
          <!--Botones para mostrar u ocultar las tablas de entradas y salidas-->
          <div align="center" id="input-output-buttons" class="mb-3">
            <button id='analog-input-button' class='btn circuit-button mb-3' onclick='hideTable(this)'
              style='background-color:gray;'>ANALOG INPUTS</button>
            <button id='analog-output-button' class='btn circuit-button mb-3' onclick='hideTable(this)'
              style='background-color:gray;'>ANALOG OUTPUTS</button>
            <button id='digital-input-button' class='btn circuit-button mb-3' onclick='hideTable(this)'
              style='background-color:gray;'>DIGITAL INPUTS</button>
            <button id='digital-output-button' class='btn circuit-button mb-3' onclick='hideTable(this)'
              style='background-color:gray;'>DIGITAL OUTPUTS</button>
          </div>
          <!-- Entradas analogicas -->
          <div style="display: none;" id="ai-values" class="row justify-content-center"></div>
          <!-- Salidas analogicas -->
          <div style="display: none;" id="ao-values" class="row justify-content-center"></div>
          <!-- Entradas digitales -->
          <div style="display: none;" id="di-values" class="row justify-content-center"></div>
          <!-- Salidas digitales -->
          <div style="display: none;" id="do-values" class="row justify-content-center"></div>
        </div>
      </main>
    </div>
  </div>
  <!-- Scripts de Librerias -->

  <script src="js/po2json.js"></script>
  <script src="js/lib/i18next.min.js"></script>
  <script src="js/lang/i18next-init.js"></script>
  <script src="js/lib/jquery.min.js"></script>
  <script src="js/lib/dixell.js"></script>
  <script src="js/layout.js"></script>
  <script>window.mountLayout('io');</script>
  <!-- Scripts de Intarcon -->
  <script src="js/scripts.js"></script>
  <script src="js/input-output.js"></script>
</body>
  <script src="js/lang/translate-page.js"></script>

</html>
